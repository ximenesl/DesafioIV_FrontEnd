<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#22c55e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
  <title>Controle Financeiro</title>
</head>
<body class="bg-light">
  <div class="container py-4">
    <header class="text-center mb-4">
      <h1 class="mb-2">Controle Financeiro</h1>
      <p class="text-muted">Acompanhe suas receitas e despesas</p>
    </header>

    <section class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 id="form-title" class="h4 mb-3">Nova Transação</h2>

        <form id="transaction-form">
          <input type="hidden" id="transaction-id" />

          <div class="mb-3">
            <label for="title" class="form-label">Título</label>
            <input type="text" id="title" class="form-control" placeholder="Ex: Salário, Almoço..." required />
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="amount" class="form-label">Valor (R$)</label>
              <input type="number" step="0.01" id="amount" class="form-control" placeholder="0.00" required />
            </div>
            <div class="col-md-6 mb-3">
              <label for="type" class="form-label">Tipo</label>
              <select id="type" class="form-select" required>
                <option value="income">Receita (Entrada)</option>
                <option value="expense">Despesa (Saída)</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="category" class="form-label">Categoria</label>
              <select id="category" class="form-select" required>
                <option value="" disabled selected>Selecione uma categoria...</option>
                <optgroup label="Entradas">
                  <option value="Salário">Salário</option>
                  <option value="Freelance">Freelance</option>
                  <option value="Investimentos">Investimentos</option>
                </optgroup>
                <optgroup label="Saídas">
                  <option value="Alimentação">Alimentação</option>
                  <option value="Moradia">Moradia</option>
                  <option value="Transporte">Transporte</option>
                  <option value="Saúde">Saúde</option>
                  <option value="Educação">Educação</option>
                  <option value="Lazer">Lazer</option>
                </optgroup>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <div class="row">
                <div class="col-6">
                  <label for="date" class="form-label">Data</label>
                  <input type="date" id="date" class="form-control" required />
                </div>
                <div class="col-6">
                  <label for="time" class="form-label">Hora</label>
                  <input type="time" id="time" class="form-control" required />
                </div>
              </div>
            </div>
          </div>

          <div class="d-flex gap-2 flex-wrap">
            <button type="submit" class="btn btn-success">Salvar Transação</button>
            <button type="button" id="cancel-edit" class="btn btn-secondary hidden">Cancelar</button>
          </div>
        </form>

        <p id="message" class="mt-3 mb-0 text-success fw-bold"></p>
      </div>
    </section>

    <div class="row mb-4 text-center">
      <div class="col-4">
        <div class="card bg-success text-white">
          <div class="card-body p-2">
            <h6>Receitas</h6>
            <h5 id="total-income">R$ 0,00</h5>
          </div>
        </div>
      </div>
      <div class="col-4">
        <div class="card bg-danger text-white">
          <div class="card-body p-2">
            <h6>Despesas</h6>
            <h5 id="total-expense">R$ 0,00</h5>
          </div>
        </div>
      </div>
      <div class="col-4">
        <div class="card bg-primary text-white">
          <div class="card-body p-2">
            <h6>Saldo</h6>
            <h5 id="total-balance">R$ 0,00</h5>
          </div>
        </div>
      </div>
    </div>

    <section class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h2 class="h4 mb-0">Histórico</h2>
          <button id="reload-btn" class="btn btn-outline-secondary btn-sm">Atualizar</button>
        </div>

        <div id="transactions-list"></div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
